version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./apiinsight-backend
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/apiinsight
      JWT_SECRET: change_this_to_a_long_random_string
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build: ./apiinsight-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongo_data:
